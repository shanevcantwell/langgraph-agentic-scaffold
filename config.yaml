# Configuration
# Version: 3.0
#
# ==============================================================================
# DEVELOPER-LEVEL CONFIGURATION
# This file is the system's blueprint, intended for developers to define the
# agent's architecture. It should NOT be exposed to or editable by end-users.
# ==============================================================================
#
# This file defines the structure of the agentic system. It is the single
# source of truth for wiring together providers, models, and specialists.
# Copy this file to `config.yaml` and customize it for your setup.

# ==============================================================================
# WORKFLOW CONFIGURATION
# ==============================================================================
# Define the entry point for the graph. Defaults to 'router_specialist'.
# ==============================================================================
workflow:
  entry_point: "triage_architect"
  # The number of times a short sequence of specialists can repeat before the
  # workflow is halted to prevent unproductive loops.
  max_loop_cycles: 3
  # The maximum number of steps the graph can take before halting. This is a
  # final safeguard against infinite loops.
  recursion_limit: 40
  # A list of specialists that are considered essential for the application to
  # function. If any of these fail to load during startup, the application will
  # exit with an error. This prevents the system from running in a broken state.
  # See ADR-010 for more details.
  critical_specialists: ["router_specialist", "end_specialist"]
  # Maps invariant violations to stabilization actions.
  # Supported actions: "HALT", "ROUTE_TO_ERROR_HANDLER"
  stabilization_actions:
    max_turn_count_exceeded: "HALT"
    loop_detected: "HALT"
    structural_integrity_violated: "HALT"

  # --- Loop Recovery Configuration (ADR-CORE-016: Menu Filter Pattern) ---
  # Enable/disable Menu Filter Pattern (Tier 1 loop recovery)
  # When enabled, loop detection removes looping specialists from router's menu
  # instead of immediate HALT, forcing innovation in routing decisions.
  enable_menu_filter: true

# ==============================================================================
# REACT CONFIGURATION (ADR-CORE-051)
# ==============================================================================
# Global defaults for specialists with react.enabled: true.
# Enables iterative tool use: LLM → tool → LLM → tool → ... → done
# ==============================================================================
react:
  defaults:
    # ADR-ROADMAP-001: Raised from 10 to 50. Stagnation detection (cycle detection)
    # is the primary safety valve - arbitrary iteration limits cause artificial
    # boundaries that require cross-invocation continuity reconstruction.
    max_iterations: 50
    stop_on_error: false

# ==============================================================================
# MCP (MESSAGE-CENTRIC PROTOCOL) CONFIGURATION
# ==============================================================================
# MCP enables specialists to call each other's functions directly without routing
# through the graph. This reduces latency and LLM costs for deterministic operations.
# ==============================================================================
mcp:
  # --- Internal MCP (Python function calls) ---
  # Toggle LangSmith trace spans for MCP calls (kill switch for tracing overhead)
  tracing_enabled: true
  # Maximum execution time per MCP call (prevents hanging on slow operations)
  timeout_seconds: 5

  # --- External MCP (Containerized services) - ADR-MCP-003 ---
  # Configuration for external MCP servers (Node.js, Docker containers, etc.)
  # See docs/ADR/ADR-MCP-003-External-MCP-Container-Integration.md for details
  external_mcp:
    # Global enable/disable for all external MCP services
    enabled: true
    # Toggle LangSmith trace spans for external MCP calls
    tracing_enabled: true
    # Configuration for individual external MCP services
    services:
      # Filesystem MCP - Official @modelcontextprotocol/server-filesystem
      # Provides: directory_tree, search_files, read_multiple_files, edit_file
      # Infrastructure defined in docker-compose.yml (profile: filesystem)
      filesystem:
        enabled: true
        required: false  # Graceful degradation if container not running
        # Use command mode to launch via docker exec with full args
        command: "docker"
        args: ["exec", "-i", "filesystem-mcp", "npx", "-y", "@modelcontextprotocol/server-filesystem", "/workspace"]
        timeout_ms: 30000

      # Navigator MCP - Browser automation with Fara visual grounding (ADR-CORE-027)
      # Infrastructure defined in docker-compose.yml, secrets in .env
      # This section only controls whether/how LAS connects to the service
      navigator:
        enabled: true
        required: false  # Graceful degradation if navigator unavailable
        container_name: "surf-mcp"  # Use docker exec instead of docker run
        timeout_ms: 30000

      # Terminal MCP - Sandboxed shell command execution (ADR-MCP-005)
      # Provides: run_command, get_cwd, get_allowed_commands
      # Security: Allowlist-based command filtering (pwd, ls, cat, head, tail, grep, etc.)
      # Infrastructure defined in docker-compose.yml (profile: terminal)
      terminal:
        enabled: true
        required: false  # Graceful degradation if container not running
        command: "docker"
        args: ["exec", "-i", "terminal-mcp", "python", "-u", "/app/terminal_mcp_server.py"]
        timeout_ms: 30000

      # Semantic Chunker MCP - Embedding tools for semantic analysis
      # Provides: calculate_drift, analyze_variants, embed_text
      # Used by Exit Interview for trace stutter detection (ADR-ROADMAP-001)
      # Infrastructure defined in docker-compose.yml (profile: semantic-chunker)
      semantic-chunker:
        enabled: true
        required: false  # Graceful degradation - stutter detection becomes no-op
        command: "docker"
        args: ["exec", "-i", "semantic-chunker-mcp", "semantic-chunker-mcp"]
        timeout_ms: 30000

# ==============================================================================
# SPECIALIST CONFIGURATION
# ==============================================================================
# Define each specialist agent. The key for each specialist (e.g., 'router_specialist')
# must match the specialist's Python module name (router_specialist.py) and the
# name passed to super().__init__() in its constructor.
# ==============================================================================
specialists:
  # --- Orchestration & Planning ---
  router_specialist:
    type: "llm"
    prompt_file: "router_prompt.md"
    description: "The master router and planner. It analyzes the user's request and routes it to the appropriate specialist. Its model should be capable of reliable tool/function calling."
    tags: ["planning", "orchestration"]

  systems_architect:
    type: "llm"
    prompt_file: "systems_architect_prompt.md"
    description: "Creates plans and designs implementation strategies. Use when user asks to 'plan', 'design', or 'architect' something. Produces a 'system_plan' artifact."
    tags: ["planning"]

  critic_specialist:
    type: "llm"
    prompt_file: "critic_prompt.md"
    description: "Analyzes a UI artifact and provides a critique for improvement. It is a key part of the refinement loop."
    # ADR-CORE-012: revision_target defines where REVISE decisions route in the generate-critique-refine subgraph
    # CRITICAL: Must match the specialist that generates the artifact being critiqued (web_builder)
    # Setting this to "router_specialist" breaks the subgraph and creates unproductive loops
    revision_target: "web_builder"
    requires_artifacts: ["html_document.html"]
    artifact_providers:
      html_document.html: "web_builder"
    critique_strategy:
      type: "llm"
      prompt_file: "critic_prompt.md"
      # ADR-CORE-053: Internal execution engine - not user-routable
    excluded_from:
      - triage_architect

  # --- Core Capabilities ---
  web_builder:
    type: "llm"
    prompt_file: "web_builder_prompt.md"
    description: "Builds or modifies web UIs (HTML/CSS/JS or Gradio Python). Can work from a 'system_plan' artifact OR from attached code files. Use this for creating new UIs, rewriting UI themes, or modifying existing web applications."
    tags: ["vision_capable"]
    # SA MCP integration: calls create_plan() directly instead of requiring artifact redirect
    tools:
      systems_architect:
        - create_plan

  # REMOVED: file_specialist - superseded by external filesystem MCP container (ADR-CORE-035)
  # File operations now handled via:
  # - batch_processor_specialist (user-initiated file operations)
  # - External filesystem MCP (containerized @modelcontextprotocol/server-filesystem)

  # DEPRECATED: file_operations_specialist - superseded by batch_processor_specialist (ADR-CORE-049)
  # The dispatcher pattern handles single AND batch operations uniformly.
  # file_operations_specialist:
  #   type: "llm"
  #   prompt_file: "file_operations_prompt.md"
  #   description: "DEPRECATED - use batch_processor_specialist"

  navigator_browser_specialist:
    type: "hybrid"
    prompt_file: "navigator_browser_specialist_prompt.md"
    description: "Web browsing with visual grounding. Navigates URLs, clicks elements by natural language description, fills forms, and extracts page content. Use for 'go to example.com', 'click the Submit button', 'type hello in the search box'."
    # ADR-CORE-051: surf-mcp browser tools
    tools:
      navigator:
        - session_create
        - session_destroy
        - goto
        - click
        - type
        - read
        - snapshot

  batch_processor_specialist:
    type: "llm"
    prompt_file: "batch_processor_prompt.md"
    description: "Callable only by project_director. Handles file operations via dispatcher pattern: create, read, write, move, delete, list, mkdir. Works for single files ('read config.yaml', 'create notes.txt') AND batch operations ('create a.txt, b.txt, c.txt', 'move files to archive/', 'sort files into folders'). Primary specialist for any filesystem task."
    # ADR-CORE-051: External MCP tool permissions
    tools:
      filesystem:
        - list_directory
        - read_file
        - write_file
        - create_directory
        - move_file
        - directory_tree
        - edit_file
        - get_file_info
    # ADR-CORE-053: Internal execution engine - not user-routable
    excluded_from:
      - triage_architect
      - router_specialist
      
  # --- Data & Analysis ---
  data_extractor_specialist:
    type: "llm"
    prompt_file: "data_extractor_prompt.md" # Use a prompt designed for Pydantic/JSON schema output.
    description: "Extracts structured data from unstructured text based on a Pydantic schema. Can use 'text_to_process' artifact or inline message content."
    # NOTE: requires_artifacts removed - specialist now falls back to message content
    # Proper solution pending ADR-CORE-040 (Context State Model). See Issue #8.

  data_processor_specialist:
    type: "procedural"
    description: "A specialist that performs deterministic data processing tasks, like formatting or cleaning, without calling an LLM."
    requires_artifacts: ["json_artifact"]
    artifact_providers:
      json_artifact: "data_extractor_specialist"

  text_analysis_specialist:
    type: "llm"
    prompt_file: "text_analysis_prompt.md"
    description: "Analyzes, summarizes, or extracts specific information from documents or text blocks. Use this for analytical tasks on text content (e.g., 'summarize this document', 'extract key points', 'analyze this code structure'). For conversational questions about text, use chat_specialist instead."
    requires_artifacts: ["text_to_process"]
    # NOTE: artifact_providers.text_to_process removed - file_specialist superseded by filesystem MCP (ADR-CORE-035)
    # text_to_process now comes from facilitator_specialist gathering via external filesystem MCP

  # --- Conversational & Chat ---

  # ==============================================================================
  # TIERED CHAT SUBGRAPH (CORE-CHAT-002) - Multi-Perspective Chat System
  # ==============================================================================
  # This implements a parallel fan-out/join pattern for richer conversational responses.
  #
  # HOW IT WORKS:
  # 1. Router selects 'chat_specialist' for user questions
  # 2. System automatically dispatches to BOTH progenitors in parallel
  # 3. Each progenitor generates its perspective independently
  # 4. Synthesizer combines both perspectives into a tiered markdown response
  #
  # BENEFITS:
  # - Richer, multi-faceted answers (analytical + intuitive perspectives)
  # - Better cross-referencing in multi-turn conversations
  # - Graceful degradation if one progenitor fails
  #
  # TO ENABLE: Keep all four specialists below uncommented
  # TO DISABLE: Comment out the three progenitor/synthesizer specialists
  #             (chat_specialist will work standalone)
  #
  # CUSTOMIZATION:
  # - Edit prompt files to change progenitor personalities/expertise
  # - Common patterns: (Technical + Creative), (Formal + Casual), (Expert + Beginner)
  # - See user_settings.yaml for model assignment strategies
  # ==============================================================================

  progenitor_alpha_specialist:
    type: "llm"
    prompt_file: "progenitor_alpha_prompt.md"
    description: "Alpha perspective in the tiered chat system. Provides analytical, structured, and methodical responses. Part of the parallel fan-out pattern for multi-perspective answers."
    # ADR-CORE-053: Internal execution engine - not user-routable
    excluded_from:
      - triage_architect
    # SYSTEM PROMPT: This specialist's LLM receives progenitor_alpha_prompt.md as its
    # system prompt. Edit this file to define Alpha's personality, expertise, tone,
    # and approach. Default: analytical/structured/methodical.
    #
    # EXAMPLE CUSTOMIZATIONS:
    # - Technical expert (code-focused, precise terminology)
    # - Formal academic (citations, research-oriented)
    # - Beginner-friendly (simple explanations, analogies)

  progenitor_bravo_specialist:
    type: "llm"
    prompt_file: "progenitor_bravo_prompt.md"
    description: "Bravo perspective in the tiered chat system. Provides intuitive, contextual, and human-centered responses. Part of the parallel fan-out pattern for multi-perspective answers."
    # ADR-CORE-053: Internal execution engine - not user-routable
    excluded_from:
      - triage_architect
    # SYSTEM PROMPT: This specialist's LLM receives progenitor_bravo_prompt.md as its
    # system prompt. Edit this file to define Bravo's personality, expertise, tone,
    # and approach. Default: intuitive/contextual/human-centered.
    #
    # EXAMPLE CUSTOMIZATIONS:
    # - Creative storyteller (metaphors, narratives)
    # - Casual conversationalist (friendly, approachable)
    # - Advanced expert (deep technical insights, edge cases)

  tiered_synthesizer_specialist:
    type: "procedural"
    description: "Combines Alpha and Bravo progenitor responses into a formatted, tiered markdown output. Acts as the join node in the fan-out/join pattern. This is a procedural specialist that does not use an LLM."
    # SYSTEM PROMPT: None - this is procedural (no LLM call).
    # It performs simple markdown formatting of the two progenitor responses.
    # No prompt file or model binding needed.
    # ADR-CORE-053: Internal subgraph node (tiered chat)
    excluded_from:
      - triage_architect

  chat_specialist:
    type: "llm"
    prompt_file: "chat_prompt.md"
    description: "Handles conversational questions, informational queries, and reasoning about gathered context. Use for explanations, dialogue, counting, comparing, summarizing observations. Examples: 'What is Python?', 'How many files?', 'Compare these results'. When tiered chat subgraph is enabled, routing here triggers parallel multi-perspective responses."
    # SYSTEM PROMPT BEHAVIOR:
    # - TIERED CHAT ENABLED: This specialist is NEVER directly executed.
    #   Routing to 'chat_specialist' triggers progenitor fan-out instead.
    #   The LLM NEVER receives chat_prompt.md - only the progenitor prompts are used.
    #
    # - TIERED CHAT DISABLED: This specialist executes normally.
    #   The LLM receives chat_prompt.md as its system prompt.
    #   Works as a standard single-perspective chat specialist.
    #
    # To disable tiered chat: Comment out the three progenitor/synthesizer specialists above.

  # --- Context Engineering Ecosystem ---
  triage_architect:
    type: "llm"
    prompt_file: "triage_architect_prompt.md"
    description: "Analyzes the user's request and creates a structured 'ContextPlan' to gather necessary information (Research, Read File, Summarize) before the main workflow begins."
    tags: ["planning", "context_engineering"]

  project_director:
    type: "llm"
    prompt_file: "project_director_prompt.md"
    description: "Manages complex, open-ended goals that require iterative investigation and state tracking. Batch or recursive processes or deep agents to gather information, refine understanding, and generate actionable solutions."
    tags: ["planning", "research", "complex_tasks"]
    # ADR-CORE-051: ReAct capability for iterative research
    react:
      enabled: true
      max_iterations: 15
    # ADR-CORE-051: Tool permissions (enables external_mcp_client injection)
    tools:
      filesystem:
        - list_directory
        - read_file
        - create_directory
        - move_file
      # ADR-MCP-005: Terminal commands for procedural operations
      terminal:
        - run_command
        - get_cwd
        - get_allowed_commands

  web_specialist:
    type: "procedural"
    description: "A primitive worker that executes a single web task from the scratchpad (search or browse) and returns the raw result. Does not manage plans or state."
    tags: ["vision_capable"]
    # Optional: Enable Fara+Playwright visual browsing
    # visual_browser:
    #   enabled: true
    #   headless: true
    #   viewport: [1920, 1080]

  summarizer_specialist:
    type: "llm"
    prompt_file: "summarizer_prompt.md"
    description: "Distills large text artifacts into concise summaries. Requires 'text_to_process' artifact."
    requires_artifacts: ["text_to_process"]
    # ADR-CORE-053: Internal execution engine - not user-routable
    excluded_from:
      - triage_architect

  facilitator_specialist:
    type: "procedural"
    description: "Orchestrates the execution of a ContextPlan by calling Researcher, FileSpecialist, and Summarizer via MCP."
    requires_artifacts: ["context_plan"]
    tags: ["planning", "context_engineering"]
    # ADR-CORE-051: Read-only filesystem access for context gathering
    tools:
      filesystem:
        - directory_tree
        - read_file
        - list_allowed_directories
        - list_directory
    # ADR-CORE-053: Internal context engineering node
    excluded_from:
      - triage_architect

  dialogue_specialist:
    type: "procedural"
    description: "DEPRECATED (ADR-CORE-059): Clarification is now handled by FacilitatorSpecialist via interrupt(). This specialist is no longer part of the graph flow."
    # ADR-CORE-059: DialogueSpecialist deprecated - ASK_USER is just another context tool
    # Facilitator handles all context actions uniformly: READ_FILE, LIST_DIRECTORY, RESEARCH, ASK_USER
    # Old flow: Triage → Facilitator → Dialogue → Router
    # New flow: Triage → Facilitator → Router
    tags: ["context_engineering", "deprecated"]
    excluded_from:
      - triage_architect
      - router_specialist

  image_specialist:
    type: "llm"
    prompt_file: "image_specialist_prompt.md"
    description: "Analyzes images using vision models. Provides detailed descriptions via MCP. Call with describe(base64_image, prompt)."
    tags: ["vision_capable"]

  # --- General & Fallback ---
  # prompt_specialist:
  #   type: "llm"
  #   prompt_file: "prompt_specialist_prompt.md"
  #   description: "A specialist for advanced prompt engineering tasks. Can be used to generate or refine prompts for other specialists or to analyze prompt structures. Does not terminate the turn."

  default_responder_specialist:
    type: "llm"
    prompt_file: "default_responder_prompt.md"
    description: "SYSTEM FALLBACK - NOT FOR TRIAGE RECOMMENDATION. Handles edge cases like greetings ('hello', 'ping') or genuinely ambiguous inputs. The triage specialist should NEVER recommend this - let the router select it automatically when no other specialist fits."
    # ADR-CORE-053: System fallback - router-selected, not triage-recommended
    excluded_from:
      - triage_architect

  # --- Procedural Specialists with External Dependencies ---
  # open_interpreter_specialist REMOVED - replaced by MCP services
  # Functionality now provided by:
  # - Shell operations: shell_specialist or direct bash MCP
  # - File operations: filesystem MCP container
  # - Code execution: specific MCP services as needed
  # BENEFIT: Removes litellm and 45+ transitive dependencies

  # --- Termination & Completion (ADR-ROADMAP-001) ---
  exit_interview_specialist:
    type: "llm"
    prompt_file: "exit_interview_prompt.md"
    description: "Gates the END node by validating task completion. Evaluates whether accumulated state satisfies the user's original request before allowing termination."
    # ADR-ROADMAP-001 Phase 1: LLM-backed completion check
    # Not user-routable - invoked automatically when Router decides END
    excluded_from:
      - triage_architect
      - router_specialist
    # Issue #117: ReAct enabled for filesystem verification
    # EI must verify file operations actually happened before marking COMPLETE
    react:
      enabled: true
      max_iterations: 5  # Verification shouldn't need many iterations
    # Issue #115: EI calls SA via MCP on-demand to produce exit_plan
    # (removed dead requires_artifacts/artifact_providers - never enforced for graph-wired specialists)
    tools:
      systems_architect:
        - create_plan
      semantic-chunker:
        - calculate_drift
      filesystem:
        - list_directory
        - read_file

  end_specialist:
    type: "hybrid"
    description: "A coordinator that synthesizes a final user response and archives the interaction. Uses an LLM for response synthesis."
    synthesis_prompt_file: "response_synthesizer_prompt.md"
    archiver_config:
      type: "procedural"
      archive_path: "./logs/archive"
      # Archive pruning: "count" limits to max_count, "none" disables pruning
      # Set max_count to 0 to disable pruning (archives are training data)
      pruning_strategy: "count"
      pruning_max_count: 0

  prompt_triage_specialist:
    type: "llm"
    prompt_file: "prompt_triage_prompt.md"
    description: "A specialist that performs a pre-flight check on the user's initial prompt for sentiment, coherence, and actionability."
    tags: ["planning"]

  # --- Deep Research (ADR-CORE-024) ---
  research_orchestrator:
    type: "llm"
    prompt_file: "research_orchestrator_prompt.md"
    description: "Coordinates deep research investigations (Search -> Browse -> Judge -> Synthesize)."
    tags: ["research", "orchestration"]

  browse_specialist:
    type: "procedural"
    description: "Fetches and parses web content. A dumb tool for the research pipeline."
    tags: ["research", "tool"]

  # synthesizer_specialist:
  #   type: "llm"
  #   prompt_file: "synthesizer_prompt.md"
  #   description: "Synthesizes research findings into comprehensive reports."
  #   tags: ["research", "synthesis"]