# ==============================================================================
# WORKFLOW CONFIGURATION
# ==============================================================================
# Define the entry point for the graph. Defaults to 'router_specialist'.
# ==============================================================================
workflow:
  entry_point: "prompt_triage_specialist"
  # The number of times a short sequence of specialists can repeat before the
  # workflow is halted to prevent unproductive loops.
  max_loop_cycles: 3
  # The maximum number of steps the graph can take before halting. This is a
  # final safeguard against infinite loops.
  recursion_limit: 40
  critical_specialists: ["router_specialist", "response_synthesizer_specialist", "archiver_specialist"]


# ==============================================================================
# SPECIALIST CONFIGURATION
# ==============================================================================
# Define each specialist agent. The key for each specialist (e.g., 'router_specialist')
# must match the specialist's Python module name (router_specialist.py) and the
# name passed to super().__init__() in its constructor.
# ==============================================================================
# config.yaml

specialists:
  # --- Orchestration & Planning ---
  router_specialist:
    type: "llm"
    prompt_file: "router_prompt.md"
    description: "The master router and planner. It analyzes the user's request and routes it to the appropriate specialist. Its model should be capable of reliable tool/function calling."

  systems_architect:
    type: "llm"
    prompt_file: "systems_architect_prompt.md"
    description: "Analyzes a user's request and creates a high-level technical plan. Produces a 'system_plan' artifact. This is a good first step for complex tasks."

  critic_specialist:
    type: "llm"
    prompt_file: "critic_wrapper_prompt.md"
    description: "A gatekeeper node that runs a configured critique strategy to ensure quality."
    requires_artifacts: ["html_document.html"]
    artifact_providers:
      html_document.html: "web_builder"
    conditional_routing: true
    revision_target: "web_builder"
    critique_strategy:
      type: "llm"
      prompt_file: "critic_prompt.md"

  # --- Core Capabilities ---
  web_builder:
    type: "llm"
    prompt_file: "web_builder_prompt.md"
    description: "Generates or refines a complete HTML document."
    requires_artifacts:
      - ["system_plan"]
      - ["html_document.html", "critique.md"]
    artifact_providers:
      system_plan: "systems_architect"
      html_document.html: "web_builder"
      critique.md: "critic_specialist"

  file_specialist:
    type: "procedural"
    description: "A procedural specialist that executes pre-planned, structured tool calls for file modification (e.g., write file, create directory). It does not interpret natural language and cannot list files; it only executes plans from other specialists."
    root_dir: "./workspace"

  # --- Data & Analysis ---
  data_extractor_specialist:
    type: "llm"
    prompt_file: "data_extractor_prompt.md"
    description: "Extracts structured, machine-readable data from text into a predefined JSON schema. Use ONLY when the desired output is a specific, rigid format (e.g., a list of names, dates, and locations). Requires a 'text_to_process' artifact."
    requires_artifacts: ["text_to_process"]
    artifact_providers:
      text_to_process: "file_specialist"

  sentiment_classifier_specialist:
    type: "llm"
    prompt_file: "sentiment_classifier_prompt.md"
    description: "Classifies the sentiment of a given text as positive, negative, or neutral. Provides analytical metadata, not a final user response."

  data_processor_specialist:
    type: "procedural"
    description: "A specialist that performs deterministic data processing tasks, like formatting or cleaning, without calling an LLM."
    requires_artifacts: ["json_artifact"]
    artifact_providers:
      json_artifact: "data_extractor_specialist"

  text_analysis_specialist:
    type: "llm"
    prompt_file: "text_analysis_prompt.md"
    description: "Performs qualitative analysis on unstructured text. Use for tasks like summarizing, finding themes, or extracting key takeaways that do not fit a rigid schema. Ideal for generating human-readable reports from a provided text artifact."
    requires_artifacts: ["text_to_process"]
    artifact_providers:
      text_to_process: "file_specialist"

  # --- General & Fallback ---
  prompt_specialist:
    type: "llm"
    prompt_file: "prompt_specialist_prompt.md"
    description: "A specialist for advanced prompt engineering tasks. Can be used to generate or refine prompts for other specialists or to analyze prompt structures. Does not terminate the turn."

  default_responder_specialist:
    type: "llm"
    prompt_file: "default_responder_prompt.md"
    description: "Handles direct, conversational Q&A and simple instructions that do not require file I/O or complex text analysis. This is the default specialist for general conversation or when no specific tool seems necessary. Acts as a fallback."

  # --- Procedural Specialists with External Dependencies ---
  open_interpreter_specialist:
    type: "hybrid"
    prompt_file: "open_interpreter_prompt.md"
    description: "Executes general-purpose shell commands and code (e.g., Python, bash) to perform complex, open-ended tasks like data analysis, web research, or running scripts. Use this for tasks that require more than simple file manipulation."

  end_specialist:
    type: "procedural"
    description: "A procedural coordinator that executes the final, deterministic termination sequence (e.g., synthesis and archiving)."

  response_synthesizer_specialist:
    type: "llm"
    prompt_file: "response_synthesizer_prompt.md"
    description: "Synthesizes a final, user-facing response from a collection of text snippets accumulated during the workflow."

  archiver_specialist:
    type: "procedural"
    archive_path: "./logs/archive"
    pruning_strategy: "count"
    pruning_max_count: 50
    description: "Summarizes the conversation and prepares the final report. This is the final step."

  prompt_triage_specialist:
    type: "llm"
    prompt_file: "prompt_triage_prompt.md"
    description: "A specialist that performs a pre-flight check on the user's initial prompt for sentiment, coherence, and actionability."