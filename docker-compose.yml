# /docker-compose.yml
# version: '3.8'

services:
  app:
    container_name: langgraph-app
    # Build the application image using the Dockerfile in the current directory.
    build:
      context: .
      args:
        # Pass the EXECUTION_MODE build argument. It defaults to 'supervised' if the
        # EXECUTION_MODE_OVERRIDE environment variable is not set on the host.
        - EXECUTION_MODE=${EXECUTION_MODE_OVERRIDE:-supervised}
    # Load secrets and configuration from the .env file.
    env_file:
      - .env
    # Set environment variables to route traffic through the proxy.
    environment:
      - HTTP_PROXY=http://proxy:3128
      - HTTPS_PROXY=http://proxy:3128
      - NO_PROXY=localhost,127.0.0.1
    # This makes the host's services (Ollama, LM Studio) available to the container.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Mount the project directory for live code changes during development.
      - .:/app
      # Create a named volume for the agent's persistent "walled garden" workspace.
      - app_workspace:/app/workspace
    ports:
      # Map the API and UI ports from the container to your host machine.
      - "8000:8000"
      - "5003:5003"
    command: ["/bin/bash", "/app/start.sh"]
    # Ensure the proxy is running before the app starts.
    depends_on:
      - proxy
    restart: unless-stopped

  proxy:
    container_name: langgraph-proxy
    image: ubuntu/squid:latest
    volumes:
      # Mount our custom, restrictive configuration file into the container.
      - ./proxy:/etc/squid
    ports:
      # Optionally expose the proxy port for direct inspection.
      - "3128:3128"
    restart: unless-stopped

volumes:
  # Define the named volume for persistent storage.
  app_workspace:
