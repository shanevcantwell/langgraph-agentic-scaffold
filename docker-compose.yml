# /docker-compose.yml
# version: '3.8'

services:
  app:
    container_name: langgraph-app
    # Build the application image using the Dockerfile in the current directory.
    build:
      context: .
      args:
        # Pass the EXECUTION_MODE build argument. It defaults to 'supervised' if the
        # EXECUTION_MODE_OVERRIDE environment variable is not set on the host.
        - EXECUTION_MODE=${EXECUTION_MODE_OVERRIDE:-supervised}
    # Load secrets and configuration from the .env file.
    env_file:
      - .env
    # Set environment variables to route traffic through the proxy.
    environment:
      - HTTP_PROXY=http://proxy:3128
      - HTTPS_PROXY=http://proxy:3128
      # Exclude internal docker services from the proxy to prevent routing loops
      - NO_PROXY=localhost,127.0.0.1,app,web-ui,proxy,langgraph-app,vegas-terminal,host.docker.internal
      # WORKSPACE_PATH for FileSpecialist and external MCP containers (ADR-MCP-003)
      # Uses /workspace (not /app/workspace) for path consistency with filesystem-mcp
      - WORKSPACE_PATH=/workspace
    # This makes the host's services (Ollama, LM Studio) available to the container.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Mount the project directory for live code changes during development.
      - .:/app
      # Mount host workspace directory at /workspace for consistency with filesystem-mcp
      - ./workspace:/workspace
      # Docker socket access for external MCP containers (ADR-MCP-003)
      - /var/run/docker.sock:/var/run/docker.sock
    # Add docker group permissions for external MCP container spawning
    # DOCKER_GID must match the host's docker socket GID: stat -c '%g' /var/run/docker.sock
    group_add:
      - "${DOCKER_GID:-133}"
    ports:
      # Map the API and UI ports from the container to your host machine.
      - "8000:8000"
      - "5003:5003"
    command: ["/bin/bash", "/app/start.sh"]
    # Ensure proxy is running before the app starts.
    depends_on:
      - proxy
    restart: unless-stopped

  proxy:
    container_name: langgraph-proxy
    # Build locally instead of pulling from Docker Hub (offline-capable)
    build:
      context: ./proxy
    volumes:
      # Mount our custom, restrictive configuration file into the container.
      - ./proxy:/etc/squid
    ports:
      # Optionally expose the proxy port for direct inspection.
      - "3128:3128"
    restart: unless-stopped

  web-ui:
    container_name: vegas-terminal
    build:
      context: ./app/web-ui
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://app:8000
      - PORT=3000
    volumes:
      - ./app/web-ui:/app
      - /app/node_modules
    depends_on:
      - app
    restart: unless-stopped

  # filesystem-mcp - Official MCP filesystem server
  # Provides: directory_tree, search_files, read_multiple_files, edit_file (with dry-run)
  # Optional service - use: docker-compose --profile filesystem up
  filesystem:
    profiles: ["filesystem"]  # Only starts with --profile filesystem
    container_name: filesystem-mcp
    image: node:20-slim
    stdin_open: true  # Required for MCP stdio transport
    tty: true
    working_dir: /workspace
    volumes:
      # Mount workspace at /workspace (same path as main app for consistency)
      - ./workspace:/workspace
    tmpfs:
      # Ephemeral temp directory - cleared on container restart
      - /tmp:size=100M,mode=1777
    # Keep container alive; LAS starts MCP server via docker exec (see config.yaml)
    command: ["tail", "-f", "/dev/null"]
    restart: unless-stopped

  # terminal-mcp - Sandboxed shell command execution (ADR-MCP-005)
  # Provides: run_command, get_cwd, get_allowed_commands
  # Security: Allowlist-based command filtering, runs as non-root, NO NETWORK ACCESS
  # Optional service - use: docker-compose --profile terminal up
  terminal:
    profiles: ["terminal"]  # Only starts with --profile terminal
    container_name: terminal-mcp
    build:
      context: ./docker/terminal-mcp
    stdin_open: true  # Required for MCP stdio transport
    tty: true
    working_dir: /workspace
    # SECURITY: Complete network isolation - no internet, no internal network
    network_mode: "none"
    volumes:
      # Mount workspace at /workspace (same path as main app for consistency)
      - ./workspace:/workspace
    environment:
      - SECURITY_MODE=allowlist
      - WORKSPACE_PATH=/workspace
    # Keep container alive; LAS starts MCP server via docker exec (see config.yaml)
    command: ["tail", "-f", "/dev/null"]
    restart: unless-stopped

  # surf-mcp - Browser automation with Fara visual grounding (ADR-CORE-027)
  # Browser-only. For filesystem ops, use filesystem-mcp above.
  # Optional service - use: docker-compose --profile surf up
  surf:
    profiles: ["surf"]  # Only starts with --profile surf
    container_name: surf-mcp
    build:
      context: ../surf-mcp  # Sibling project
    stdin_open: true  # Required for MCP stdio transport
    tty: true
    environment:
      # LM Studio / Fara Configuration - reuse existing LMSTUDIO_SERVERS
      - LMSTUDIO_SERVERS=${LMSTUDIO_SERVERS}
      - FARA_MODEL_IDS=${FARA_MODEL_IDS:-microsoft_fara-7b}
      - FARA_MAX_FAILURES=${FARA_MAX_FAILURES:-2}
      - FARA_MIN_CONFIDENCE=${FARA_MIN_CONFIDENCE:-0.7}
      - FARA_MAX_AGENT_STEPS=${FARA_MAX_AGENT_STEPS:-20}
      - SURF_LOG_LEVEL=${SURF_LOG_LEVEL:-INFO}
      # Session Configuration
      - SURF_MAX_SESSIONS=10
      - SURF_SESSION_TIMEOUT_SECONDS=3600
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # semantic-chunker-mcp - Embedding tools for semantic analysis
  # Provides: calculate_drift, analyze_variants, embed_text
  # Used by Exit Interview for trace stutter detection
  # Optional service - use: docker-compose --profile semantic-chunker up
  semantic-chunker:
    profiles: ["semantic-chunker"]  # Only starts with --profile semantic-chunker
    container_name: semantic-chunker-mcp
    build:
      context: ../semantic-chunker  # Sibling project
    stdin_open: true  # Required for MCP stdio transport
    tty: true
    environment:
      # LMStudio embedding server (v0.1.1: EMBEDDING_BACKEND selects adapter)
      - EMBEDDING_BACKEND=lmstudio
      - EMBEDDING_SERVER_URL=${EMBEDDING_SERVER_URL}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # it-tools-mcp - 121+ data format, encoding, and utility tools
  # Source: wrenchpilot/it-tools-mcp (MCP reimplementation inspired by CorentinTh/it-tools)
  # Provides: format_json, convert_json_to_csv, convert_toml_to_json, format_yaml,
  #           format_xml, base64 encode/decode, hash, regex, uuid, and 100+ more
  # Optional service - use: docker-compose --profile it-tools up
  it-tools:
    profiles: ["it-tools"]
    container_name: it-tools-mcp
    image: wrenchpilot/it-tools-mcp:v5.10.2
    stdin_open: true  # Required for MCP stdio transport
    tty: true
    # Override entrypoint to keep container alive; LAS starts MCP server via docker exec
    entrypoint: ["tail", "-f", "/dev/null"]
    restart: unless-stopped

  # prompt-prix-mcp - Evaluation harness for model comparison and battery testing
  # Provides: complete, judge, list_models, react_step, calculate_drift,
  #           analyze_variants, generate_variants, analyze_trajectory, compare_trajectories
  # Optional service - use: docker-compose --profile prompt-prix up
  prompt-prix:
    profiles: ["prompt-prix"]
    container_name: prompt-prix-mcp
    build:
      context: ../prompt-prix  # Sibling project
    stdin_open: true  # Required for MCP stdio transport
    tty: true
    environment:
      - LM_STUDIO_SERVER_1=${LM_STUDIO_SERVER_1}
      - LM_STUDIO_SERVER_2=${LM_STUDIO_SERVER_2}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    command: ["tail", "-f", "/dev/null"]  # Keep alive; LAS starts via docker exec
