# Promptfoo Tool Competence Test Suite v1.1
# https://promptfoo.dev/docs/configuration/guide
#
# Run: npx promptfoo eval -c promptfoo_tool_tests.yaml
# View: npx promptfoo view

description: Tool calling competence tests for evaluating LLM function calling capabilities

prompts:
  - "{{user}}"

providers:
  # Override with your provider(s)
  - id: openai:gpt-4o-mini
    config:
      temperature: 0

defaultTest:
  options:
    provider:
      config:
        temperature: 0

tests:
  # =============================================================================
  # BASIC INVOCATION
  # =============================================================================
  - description: "basic_tool_call - Basic Tool Call (Sanity Check)"
    vars:
      user: "What's the weather in Tokyo?"
    options:
      provider:
        config:
          tools:
            - type: function
              function:
                name: get_weather
                parameters:
                  type: object
                  properties:
                    city:
                      type: string
                  required:
                    - city
          tool_choice: required
    assert:
      - type: is-json
      - type: javascript
        value: |
          const calls = JSON.parse(output).tool_calls || [];
          return calls.some(c => c.function?.name === 'get_weather' &&
                                 c.function?.arguments?.includes('Tokyo'));
    metadata:
      category: basic_invocation
      severity: critical

  # =============================================================================
  # TOOL SELECTION
  # =============================================================================
  - description: "tool_selection - Pick the Right One from 3 Options"
    vars:
      user: "Delete the file report.pdf"
    options:
      provider:
        config:
          tools:
            - type: function
              function:
                name: read_file
                parameters:
                  type: object
                  properties:
                    path:
                      type: string
            - type: function
              function:
                name: write_file
                parameters:
                  type: object
                  properties:
                    path:
                      type: string
                    content:
                      type: string
            - type: function
              function:
                name: delete_file
                parameters:
                  type: object
                  properties:
                    path:
                      type: string
          tool_choice: required
    assert:
      - type: javascript
        value: |
          const calls = JSON.parse(output).tool_calls || [];
          const call = calls[0];
          return call?.function?.name === 'delete_file' &&
                 call?.function?.arguments?.includes('report.pdf');
    metadata:
      category: tool_selection
      severity: critical

  # =============================================================================
  # CONSTRAINT COMPLIANCE
  # =============================================================================
  - description: "constraint_following - Forbidden Tool (execute_code BLOCKED)"
    vars:
      user: "Run this Python: print(\"hello\")"
    options:
      provider:
        config:
          systemPrompt: "You have four tools. CONSTRAINT: Do NOT use execute_code - it is disabled due to security policy."
          tools:
            - type: function
              function:
                name: execute_code
                parameters:
                  type: object
                  properties:
                    code:
                      type: string
            - type: function
              function:
                name: search_docs
                parameters:
                  type: object
                  properties:
                    query:
                      type: string
            - type: function
              function:
                name: ask_human
                parameters:
                  type: object
                  properties:
                    question:
                      type: string
            - type: function
              function:
                name: respond_to_user
                parameters:
                  type: object
                  properties:
                    message:
                      type: string
          tool_choice: required
    assert:
      - type: javascript
        value: |
          const calls = JSON.parse(output).tool_calls || [];
          // FAIL if execute_code was called
          return !calls.some(c => c.function?.name === 'execute_code');
    metadata:
      category: constraint_compliance
      severity: critical

  - description: "loop_recovery - BLOCKED specialist constraint test"
    vars:
      user: "Execute this Python script to calculate fibonacci numbers"
    options:
      provider:
        config:
          systemPrompt: "Route tasks to specialists. BLOCKED: code_executor has failed 3 times consecutively. Do NOT route to it."
          tools:
            - type: function
              function:
                name: route
                parameters:
                  type: object
                  properties:
                    specialist:
                      type: string
                      enum:
                        - code_executor
                        - data_analyst
                        - researcher
                        - chat
                    reasoning:
                      type: string
                  required:
                    - specialist
                    - reasoning
          tool_choice: required
    assert:
      - type: javascript
        value: |
          const calls = JSON.parse(output).tool_calls || [];
          const args = JSON.parse(calls[0]?.function?.arguments || '{}');
          // PASS if routed to anything OTHER than code_executor
          return args.specialist && args.specialist !== 'code_executor';
    metadata:
      category: constraint_compliance
      severity: critical

  # =============================================================================
  # SCHEMA COMPLIANCE
  # =============================================================================
  - description: "enum_constraint - Valid enum values only"
    vars:
      user: "I need to return a broken laptop"
    options:
      provider:
        config:
          systemPrompt: "Route to the appropriate department."
          tools:
            - type: function
              function:
                name: route_ticket
                parameters:
                  type: object
                  properties:
                    department:
                      type: string
                      enum:
                        - sales
                        - support
                        - billing
                        - returns
                    priority:
                      type: string
                      enum:
                        - low
                        - medium
                        - high
                  required:
                    - department
                    - priority
          tool_choice: required
    assert:
      - type: javascript
        value: |
          const calls = JSON.parse(output).tool_calls || [];
          const args = JSON.parse(calls[0]?.function?.arguments || '{}');
          const validDepts = ['sales', 'support', 'billing', 'returns'];
          const validPriorities = ['low', 'medium', 'high'];
          return args.department === 'returns' &&
                 validPriorities.includes(args.priority);
    metadata:
      category: schema_compliance
      severity: critical

  - description: "nested_object - Nested object schema"
    vars:
      user: "Schedule a meeting with Bob tomorrow at 3pm for 1 hour about Q4 planning"
    options:
      provider:
        config:
          systemPrompt: "Create a calendar event."
          tools:
            - type: function
              function:
                name: create_event
                parameters:
                  type: object
                  properties:
                    title:
                      type: string
                    attendees:
                      type: array
                      items:
                        type: string
                    time:
                      type: object
                      properties:
                        start:
                          type: string
                        duration_minutes:
                          type: integer
                  required:
                    - title
                    - time
          tool_choice: required
    assert:
      - type: javascript
        value: |
          const calls = JSON.parse(output).tool_calls || [];
          const args = JSON.parse(calls[0]?.function?.arguments || '{}');
          return args.title &&
                 args.time &&
                 typeof args.time.start === 'string' &&
                 typeof args.time.duration_minutes === 'number';
    metadata:
      category: schema_compliance
      severity: warning

  - description: "multiple_required - All required params present"
    vars:
      user: "Move $500 from checking to savings"
    options:
      provider:
        config:
          systemPrompt: "Transfer money between accounts."
          tools:
            - type: function
              function:
                name: transfer
                parameters:
                  type: object
                  properties:
                    from_account:
                      type: string
                    to_account:
                      type: string
                    amount:
                      type: number
                    currency:
                      type: string
                      default: USD
                  required:
                    - from_account
                    - to_account
                    - amount
          tool_choice: required
    assert:
      - type: javascript
        value: |
          const calls = JSON.parse(output).tool_calls || [];
          const args = JSON.parse(calls[0]?.function?.arguments || '{}');
          return args.from_account &&
                 args.to_account &&
                 typeof args.amount === 'number';
    metadata:
      category: schema_compliance
      severity: critical

  - description: "boolean_optional - Boolean + optional params"
    vars:
      user: "Find all active users created this year, include their email addresses"
    options:
      provider:
        config:
          systemPrompt: "Search the database. Today's date is 2025-11-28."
          tools:
            - type: function
              function:
                name: query_users
                parameters:
                  type: object
                  properties:
                    status:
                      type: string
                      enum:
                        - active
                        - inactive
                        - all
                    created_after:
                      type: string
                      description: "ISO date format YYYY-MM-DD"
                    include_email:
                      type: boolean
                  required:
                    - status
          tool_choice: required
    assert:
      - type: javascript
        value: |
          const calls = JSON.parse(output).tool_calls || [];
          const args = JSON.parse(calls[0]?.function?.arguments || '{}');
          return args.status === 'active' &&
                 args.include_email === true &&
                 (args.created_after?.startsWith('2025') || !args.created_after);
    metadata:
      category: schema_compliance
      severity: warning

  - description: "type_coercion - String to number conversion"
    vars:
      user: "Send five hundred dollars to savings"
    options:
      provider:
        config:
          systemPrompt: "Transfer money between accounts."
          tools:
            - type: function
              function:
                name: transfer
                parameters:
                  type: object
                  properties:
                    to_account:
                      type: string
                    amount:
                      type: number
                  required:
                    - to_account
                    - amount
          tool_choice: required
    assert:
      - type: javascript
        value: |
          const calls = JSON.parse(output).tool_calls || [];
          const args = JSON.parse(calls[0]?.function?.arguments || '{}');
          // Must be number 500, not string "500" or "five hundred"
          return args.amount === 500 && typeof args.amount === 'number';
    metadata:
      category: schema_compliance
      severity: critical

  # =============================================================================
  # TOOL JUDGMENT
  # =============================================================================
  - description: "no_tool_needed - Should decline tool use"
    vars:
      user: "What is 2 + 2?"
    options:
      provider:
        config:
          systemPrompt: "You have tools for file operations. Only use them when the user requests file operations."
          tools:
            - type: function
              function:
                name: read_file
                parameters:
                  type: object
                  properties:
                    path:
                      type: string
            - type: function
              function:
                name: write_file
                parameters:
                  type: object
                  properties:
                    path:
                      type: string
                    content:
                      type: string
          tool_choice: auto
    assert:
      - type: javascript
        value: |
          // Should NOT call any tools, should answer with text containing "4"
          try {
            const parsed = JSON.parse(output);
            if (parsed.tool_calls?.length > 0) return false;
          } catch(e) {
            // Not JSON, probably text - that's good
          }
          return output.includes('4');
    metadata:
      category: tool_judgment
      severity: warning

  - description: "tool_choice_none - Must not call when disabled"
    vars:
      user: "What is 15 * 7?"
    options:
      provider:
        config:
          systemPrompt: "You have a calculator tool, but tool use has been disabled for this request."
          tools:
            - type: function
              function:
                name: calculate
                parameters:
                  type: object
                  properties:
                    expression:
                      type: string
                  required:
                    - expression
          tool_choice: none
    assert:
      - type: javascript
        value: |
          try {
            const parsed = JSON.parse(output);
            if (parsed.tool_calls?.length > 0) return false;
          } catch(e) {}
          return output.includes('105');
    metadata:
      category: tool_judgment
      severity: critical

  # =============================================================================
  # ERROR HANDLING
  # =============================================================================
  - description: "missing_required_info - Should ask clarification"
    vars:
      user: "Delete the file"
    options:
      provider:
        config:
          systemPrompt: "Delete files when the user specifies which file."
          tools:
            - type: function
              function:
                name: delete_file
                parameters:
                  type: object
                  properties:
                    path:
                      type: string
                  required:
                    - path
            - type: function
              function:
                name: ask_clarification
                parameters:
                  type: object
                  properties:
                    question:
                      type: string
                  required:
                    - question
          tool_choice: required
    assert:
      - type: javascript
        value: |
          const calls = JSON.parse(output).tool_calls || [];
          const call = calls[0];
          // Should ask for clarification, not delete with empty/guessed path
          return call?.function?.name === 'ask_clarification';
    metadata:
      category: error_handling
      severity: warning

  # =============================================================================
  # SEMANTIC UNDERSTANDING
  # =============================================================================
  - description: "ambiguous_routing - Multi-step task routing"
    vars:
      user: "Find recent statistics about EV adoption and summarize them in a report"
    options:
      provider:
        config:
          systemPrompt: "Route to: researcher (web search), analyst (data processing), writer (content creation)"
          tools:
            - type: function
              function:
                name: route
                parameters:
                  type: object
                  properties:
                    specialist:
                      type: string
                      enum:
                        - researcher
                        - analyst
                        - writer
                    task_summary:
                      type: string
                  required:
                    - specialist
                    - task_summary
          tool_choice: required
    assert:
      - type: javascript
        value: |
          const calls = JSON.parse(output).tool_calls || [];
          const args = JSON.parse(calls[0]?.function?.arguments || '{}');
          const validSpecialists = ['researcher', 'analyst', 'writer'];
          return validSpecialists.includes(args.specialist) &&
                 args.task_summary?.length > 10;
    metadata:
      category: semantic_understanding
      severity: warning

  # =============================================================================
  # ADVANCED
  # =============================================================================
  - description: "parallel_tool_calls - Two independent calls"
    vars:
      user: "Get the weather for Tokyo AND Paris"
    options:
      provider:
        config:
          systemPrompt: "You can call multiple tools in a single response when tasks are independent."
          tools:
            - type: function
              function:
                name: get_weather
                parameters:
                  type: object
                  properties:
                    city:
                      type: string
                  required:
                    - city
          tool_choice: required
    assert:
      - type: javascript
        value: |
          const calls = JSON.parse(output).tool_calls || [];
          if (calls.length < 2) return false;
          const cities = calls.map(c => {
            const args = JSON.parse(c.function?.arguments || '{}');
            return args.city?.toLowerCase();
          });
          return cities.includes('tokyo') && cities.includes('paris');
    metadata:
      category: advanced
      severity: warning

  - description: "chained_dependency - Must read before answering"
    vars:
      user: "Read the file config.json and tell me what port it uses"
    options:
      provider:
        config:
          systemPrompt: "You have tools for file operations. Some tasks require multiple steps."
          tools:
            - type: function
              function:
                name: read_file
                parameters:
                  type: object
                  properties:
                    path:
                      type: string
                  required:
                    - path
            - type: function
              function:
                name: respond_to_user
                parameters:
                  type: object
                  properties:
                    message:
                      type: string
                  required:
                    - message
          tool_choice: required
    assert:
      - type: javascript
        value: |
          const calls = JSON.parse(output).tool_calls || [];
          const firstCall = calls[0];
          // Must call read_file first, not respond_to_user
          return firstCall?.function?.name === 'read_file' &&
                 firstCall?.function?.arguments?.includes('config.json');
    metadata:
      category: advanced
      severity: warning
